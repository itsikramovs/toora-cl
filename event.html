<!DOCTYPE html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Мероприятие — Togora</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FC3F1D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Togora">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<body>

<div class="product-page event-landing">

  <!-- Hero with title overlay -->
  <div class="event-hero">
    <img id="eventImg" src="./img/ev-04.jpg" alt="">
    <div class="event-hero-gradient"></div>
    <div class="product-hero-top">
      <button class="ph-btn" id="ph-back" aria-label="Назад">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="ph-btn" id="ph-share" aria-label="Поделиться">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
    <div class="event-hero-meta">
      <span class="event-hero-kicker" id="eventKicker">Национальное торжество</span>
      <h1 class="event-hero-title" id="eventTitle">Свадьба</h1>
    </div>
  </div>

  <!-- Intro card: rich event description (collapsed by default) -->
  <section class="product-block event-intro">
    <p class="event-intro-text collapsed" id="eventDesc"></p>
    <button class="event-intro-toggle" id="eventDescToggle" type="button" hidden>Читать полностью</button>
  </section>

  <div class="sep"></div>

  <!-- Reels (horizontal scroll) -->
  <section class="event-scroll-section" id="reelsSection">
    <div class="event-section-head">
      <h2 class="event-section-title">Атмосфера торжества</h2>
      <span class="event-section-sub">Рилсы</span>
    </div>
    <div class="scroll-x event-reels-scroll" id="eventReelsScroll"></div>
  </section>

  <div class="sep"></div>

  <!-- Photo gallery (horizontal scroll) -->
  <section class="event-scroll-section" id="gallerySection">
    <div class="event-section-head">
      <h2 class="event-section-title">Как это выглядит</h2>
      <span class="event-section-sub">Фото со столов</span>
    </div>
    <div class="scroll-x event-gallery-scroll" id="eventGalleryScroll"></div>
  </section>

  <div class="sep"></div>

  <!-- Suitable dishes — curated, no filter UI -->
  <section class="product-block event-dishes">
    <div class="event-section-head">
      <h2 class="event-section-title">Блюда для торжества</h2>
      <span class="event-section-sub" id="dishCount"></span>
    </div>
    <div class="mini-grid-2col" id="dishGrid"></div>
  </section>

</div>

<!-- Lightbox for reel / gallery taps -->
<div class="event-lb-overlay" id="lbOverlay"></div>
<div class="event-lb" id="lb" role="dialog" aria-modal="true">
  <button class="event-lb-close" id="lbClose" type="button" aria-label="Закрыть">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="event-lb-counter" id="lbCounter" hidden></div>
  <button class="event-lb-nav prev" id="lbPrev" type="button" aria-label="Предыдущее фото" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="event-lb-nav next" id="lbNext" type="button" aria-label="Следующее фото" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <img class="event-lb-img" id="lbImg" src="" alt="">
  <div class="event-lb-play" id="lbPlay" hidden>
    <svg viewBox="0 0 24 24" fill="#fff"><polygon points="6 4 22 12 6 20 6 4"/></svg>
  </div>
  <div class="event-lb-caption" id="lbCaption"></div>
</div>

        { poster: './img/dish-06.jpg', avatar: './img/dish-08.jpg', vendor: 'Tandur Master',caption: 'Тандыр-нон — горячий из печи',  views: 1100 }
      ],
      gallery: [ './img/ev-02.jpg', './img/dish-02.jpg', './img/dish-12.jpg', './img/dish-06.jpg', './img/dish-15.jpg' ],
      bundles: [
        { name: 'Семейный ифтар', img: './img/ev-02.jpg', desc: 'Финики, бульон, плов, лепёшки, чай — на 6 гостей', price: 220000, vendor: 'Osh Markazi' }
      ],
      items: [
        { name: 'Osh Palav',  img: './img/dish-02.jpg', price: 28000, vendor: 'Osh Markazi' },
        { name: 'Mayda norin', img: './img/dish-12.jpg', price: 28000, vendor: 'Norin House' },
        { name: 'Тандыр-нон', img: './img/dish-06.jpg', price: 12000, vendor: 'Tandur Master' }
      ]
    }
  };

  var params = new URLSearchParams(location.search);
  var type = params.get('type') || 'wedding';
  var ev = EVENT_CATALOG[type] || EVENT_CATALOG['wedding'];

  document.title = ev.title + ' — Togora';
  document.getElementById('eventImg').src = ev.img;
  document.getElementById('eventTitle').textContent = ev.title;
  document.getElementById('eventKicker').textContent = ev.kicker || 'Национальное торжество';
  var $desc = document.getElementById('eventDesc');
  var $descToggle = document.getElementById('eventDescToggle');
  $desc.textContent = ev.desc;
  // Show the toggle only when the description is long enough that clamping kicks in
  requestAnimationFrame(function(){
    // If the element is actually being clipped, scrollHeight > clientHeight.
    if ($desc.scrollHeight > $desc.clientHeight + 1) {
      $descToggle.hidden = false;
    }
  });
  $descToggle.addEventListener('click', function(){
    var nowCollapsed = $desc.classList.toggle('collapsed');
    $descToggle.textContent = nowCollapsed ? 'Читать полностью' : 'Свернуть';
  });

  function esc(s) { return (window.TG && TG.escHTML) ? TG.escHTML(s) : String(s||''); }
  function escAttr(s) { return esc(s).replace(/"/g,'&quot;'); }
  function fmt(n) { return n.toLocaleString('ru-RU').replace(/,/g, ' ') + ' сум'; }
  function pluralDish(n){
    var n10 = n % 10, n100 = n % 100;
    if (n10 === 1 && n100 !== 11) return n + ' блюдо';
    if (n10 >= 2 && n10 <= 4 && (n100 < 12 || n100 > 14)) return n + ' блюда';
    return n + ' блюд';
  }

  // ---- Reels (horizontal scroll) ----
  var $reelsScroll = document.getElementById('eventReelsScroll');
  var $reelsSection = document.getElementById('reelsSection');
  function formatViews(n) {
    if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
    return String(n);
  }
  if (ev.reels && ev.reels.length) {
    $reelsScroll.innerHTML = ev.reels.map(function(r, i) {
      return '<div class="reel-card" data-i="' + i + '">'
        +   '<img class="reel-poster" src="' + escAttr(r.poster) + '" alt="' + escAttr(r.vendor) + '">'
        +   '<div class="reel-grad"></div>'
        +   '<div class="reel-avatar"><img src="' + escAttr(r.avatar || r.poster) + '" alt=""></div>'
        +   '<div class="reel-views">'
        +     '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3" fill="#000"/></svg>'
        +     formatViews(r.views || 0)
        +   '</div>'
        +   '<div class="reel-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
        +   '<div class="reel-info">'
        +     '<div class="reel-name">' + esc(r.vendor) + '</div>'
        +     '<div class="reel-cap">' + esc(r.caption.length > 32 ? r.caption.slice(0,30) + '…' : r.caption) + '</div>'
        +   '</div>'
        + '</div>';
    }).join('');
    $reelsScroll.addEventListener('click', function(e){
      var card = e.target.closest('.reel-card');
      if (!card) return;
      var r = ev.reels[parseInt(card.dataset.i, 10)];
      if (r) openLightbox(r.poster, r.vendor + ' · ' + r.caption, true);
    });
  } else {
    $reelsSection.style.display = 'none';
  }

  // ---- Photo gallery (horizontal scroll) ----
  var $galleryScroll = document.getElementById('eventGalleryScroll');
  var $gallerySection = document.getElementById('gallerySection');
  if (ev.gallery && ev.gallery.length) {
    var total = ev.gallery.length;
    // Per-card stack badge: descending counter = photos remaining starting
    // from this card (incl.), thumbs = next 3 photos (wrap-around). Last
    // card (remaining = 1) gets no badge — nothing further to preview.
    function buildBadge(i) {
      var remaining = total - i;
      if (total < 2 || remaining < 2) return '';
      var nThumbs = Math.min(3, remaining - 1);
      var thumbsHtml = '';
      for (var j = 1; j <= nThumbs; j++) {
        var src2 = ev.gallery[(i + j) % total];
        thumbsHtml += '<div class="gb-thumb" style="background-image:url(\''
                    + escAttr(src2) + '\')"></div>';
      }
      var countText = remaining > 9 ? (remaining - 1) + '+' : String(remaining);
      return '<div class="gallery-badge-stack" aria-hidden="true">'
           + '<div class="gb-thumbs">' + thumbsHtml + '</div>'
           + '<div class="gb-count">' + countText + '</div>'
           + '</div>';
    }
    $galleryScroll.innerHTML = ev.gallery.map(function(src, i) {
      return '<div class="event-gallery-card" data-i="' + i + '" '
           + 'style="background-image:url(\'' + escAttr(src) + '\')" '
           + 'role="button" aria-label="Открыть фото ' + (i+1) + ' из ' + total + '">'
           + buildBadge(i)
           + '</div>';
    }).join('');
    $galleryScroll.addEventListener('click', function(e){
      var card = e.target.closest('.event-gallery-card');
      if (!card) return;
      var idx = parseInt(card.dataset.i, 10) || 0;
      openLightbox(ev.gallery[idx], '', false, { gallery: ev.gallery, index: idx });
    });
  } else {
    $gallerySection.style.display = 'none';
  }

  // ---- Lightbox (single image or gallery with swipe/arrows) ----
  var $lb        = document.getElementById('lb');
  var $lbOverlay = document.getElementById('lbOverlay');
  var $lbImg     = document.getElementById('lbImg');
  var $lbCaption = document.getElementById('lbCaption');
  var $lbClose   = document.getElementById('lbClose');
  var $lbPlay    = document.getElementById('lbPlay');
  var $lbPrev    = document.getElementById('lbPrev');
  var $lbNext    = document.getElementById('lbNext');
  var $lbCounter = document.getElementById('lbCounter');

  // Gallery state — null if single-image mode
  var lbGallery = null;
  var lbIndex   = 0;

  function lbUpdateCounter(){
    if (lbGallery && lbGallery.length > 1) {
      $lbCounter.hidden = false;
      $lbCounter.textContent = (lbIndex + 1) + ' / ' + lbGallery.length;
    } else {
      $lbCounter.hidden = true;
    }
  }
  function lbGo(delta){
    if (!lbGallery || lbGallery.length < 2) return;
    lbIndex = (lbIndex + delta + lbGallery.length) % lbGallery.length;
    $lbImg.src = lbGallery[lbIndex];
    lbUpdateCounter();
  }

  function openLightbox(src, caption, isVideo, opts){
    opts = opts || {};
    lbGallery = (opts.gallery && opts.gallery.length) ? opts.gallery.slice() : null;
    lbIndex   = (opts.index | 0) || 0;
    $lbImg.src = src;
    $lbCaption.textContent = caption || '';
    $lbCaption.style.display = caption ? '' : 'none';
    $lbPlay.hidden = !isVideo;
    var hasGallery = !!(lbGallery && lbGallery.length > 1) && !isVideo;
    $lbPrev.hidden = !hasGallery;
    $lbNext.hidden = !hasGallery;
    lbUpdateCounter();
    $lb.classList.add('open');
    $lbOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(){
    $lb.classList.remove('open');
    $lbOverlay.classList.remove('open');
    document.body.style.overflow = '';
    $lbImg.src = '';
    lbGallery = null;
    lbIndex = 0;
    $lbPrev.hidden = true;
    $lbNext.hidden = true;
    $lbCounter.hidden = true;
  }
  $lbClose.addEventListener('click', closeLightbox);
  $lbOverlay.addEventListener('click', closeLightbox);
  $lbPrev.addEventListener('click', function(e){ e.stopPropagation(); lbGo(-1); });
  $lbNext.addEventListener('click', function(e){ e.stopPropagation(); lbGo(1); });

  // Touch swipe on the image — left/right swipes navigate the gallery
  var _touchStartX = 0, _touchStartY = 0, _touching = false;
  $lbImg.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) return;
    _touchStartX = e.touches[0].screenX;
    _touchStartY = e.touches[0].screenY;
    _touching = true;
  }, { passive: true });
  $lbImg.addEventListener('touchend', function(e){
    if (!_touching) return;
    _touching = false;
    var t = e.changedTouches[0];
    var dx = t.screenX - _touchStartX;
    var dy = t.screenY - _touchStartY;
    // Only horizontal swipes (ignore vertical scroll-like gestures)
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    lbGo(dx < 0 ? 1 : -1);
  }, { passive: true });

  // Keyboard navigation
  document.addEventListener('keydown', function(e){
    if (!$lb.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    else if (e.key === 'ArrowLeft')  lbGo(-1);
    else if (e.key === 'ArrowRight') lbGo(1);
  });

  // ---- Dishes grid ----
  var grid = document.getElementById('dishGrid');
  document.getElementById('dishCount').textContent = pluralDish((ev.items || []).length);

  grid.innerHTML = (ev.items || []).map(function(d) {
    return '<div class="mini-card" data-name="' + escAttr(d.name) +
           '" data-img="' + escAttr(d.img) + '">' +
      '<div class="mini-img">' +
        '<img src="' + d.img + '" alt="">' +
        '<div class="mini-img-overlay"></div>' +
        '<button class="add-btn-float" type="button" data-name="' + escAttr(d.name) + '" aria-label="Добавить">' +
          '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="mini-body">' +
        '<div class="mini-price">' + fmt(d.price) + '</div>' +
        '<div class="mini-name">' + esc(d.name) + '</div>' +
        '<div class="mini-vendor">' + esc(d.vendor) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Card body → product page (skip when tapping +/− or stepper)
  grid.addEventListener('click', function(e) {
    if (e.target.closest('.add-btn-float, .qty-stepper, .qs-btn, button')) return;
    var card = e.target.closest('.mini-card');
    if (!card) return;
    var qs = 'name=' + encodeURIComponent(card.dataset.name) + '&img=' + encodeURIComponent(card.dataset.img);
    location.href = 'product.html?' + qs;
  });

  // Shared cart wiring for the mini-card "+ / qty stepper"
  if (TG.wireMiniCardCart) TG.wireMiniCardCart(grid);

  // ---- Nav cart pill ----
  function updateCartPill(){
    var pill = document.getElementById('navCartPill');
    if (!pill) return;
    var n = (TG && TG.cartCount) ? TG.cartCount() : 0;
    if (n > 0) { pill.hidden = false; pill.textContent = n; }
    else       { pill.hidden = true; }
  }
  updateCartPill();
  window.addEventListener('tg:cart-changed', updateCartPill);

  // ---- Top buttons ----
  document.getElementById('ph-back').addEventListener('click', function() {
    if (history.length > 1) history.back();
    else location.href = 'events.html';
  });
  document.getElementById('ph-share').addEventListener('click', function() {
    if (navigator.share) navigator.share({ title: ev.title, url: location.href }).catch(function() {});
    else if (window.TG && TG.showToast) TG.showToast('Ссылка скопирована');
  });
})();
</script>

</body>
</html>
