<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FC3F1D"/>
      <stop offset="100%" stop-color="#E8330F"/>
    </linearGradient>
  </defs>
  <!-- Background — rounded square, brand orange gradient -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stylized "T" letter -->
  <rect x="120" y="148" width="272" height="56" rx="14" fill="#fff"/>
  <rect x="228" y="148" width="56"  height="240" rx="14" fill="#fff"/>
  <!-- Pin dot at bottom of the T to hint at delivery / location -->
  <circle cx="256" cy="412" r="28" fill="#fff"/>
  <circle cx="256" cy="412" r="11" fill="#FC3F1D"/>
</svg>
