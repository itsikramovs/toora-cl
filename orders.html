<!DOCTYPE html>
<html lang="ru" dir="ltr" data-theme-name="bng" data-palette-mode="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0">
<title>Мои заказы — Togora</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FC3F1D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Togora">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="page-header">
  <a class="page-back" href="profile.html" aria-label="Назад">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <h1 class="page-title">Мои заказы</h1>
</header>

<div class="page-tabs" id="ordersTabs">
  <button class="page-tab active" type="button" data-tab="all">Все <span class="pt-count" id="cntAll">0</span></button>
  <button class="page-tab" type="button" data-tab="active">Активные <span class="pt-count" id="cntActive">0</span></button>
  <button class="page-tab" type="button" data-tab="completed">Завершённые <span class="pt-count" id="cntCompleted">0</span></button>
</div>

<main class="orders-page">
  <div class="orders-list" id="ordersList"></div>
</main>

<!-- ═══ Courier tracking sheet (full-screen, opens from detail) ═══ -->
<div class="track-sheet" id="trackSheet" role="dialog" aria-modal="true" aria-label="Отслеживание курьера">
  <header class="track-head">
    <button class="track-back" id="trackBack" type="button" aria-label="Назад">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="track-title-wrap">
      <div class="track-title" id="trackTitle">Доставка</div>
      <div class="track-sub" id="trackSub">Курьер в пути</div>
    </div>
  </header>
  <div class="track-map-wrap">
    <div id="trackMap"></div>
    <div class="track-card" id="trackCard">
      <div class="track-eta-row">
        <div class="track-eta-block">
          <div class="track-eta-label">До вас</div>
          <div class="track-eta-value"><span id="trackEtaMin">—</span> <span class="track-eta-unit">мин</span></div>
        </div>
        <div class="track-eta-sep"></div>
        <div class="track-eta-block">
          <div class="track-eta-label">Расстояние</div>
          <div class="track-eta-value"><span id="trackDistance">—</span> <span class="track-eta-unit">км</span></div>
        </div>
        <div class="track-eta-sep"></div>
        <div class="track-eta-block">
          <div class="track-eta-label">Прибытие</div>
          <div class="track-eta-value" id="trackArrive">—</div>
        </div>
      </div>
      <div class="track-courier">
        <div class="track-avatar" id="trackAvatar">А</div>
        <div class="track-courier-body">
          <div class="track-courier-name" id="trackName">Курьер</div>
          <div class="track-courier-role" id="trackRole">Едет к вам</div>
        </div>
        <a class="track-call-btn" id="trackCall" href="tel:+998901234567" aria-label="Позвонить курьеру">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.37 1.9.72 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0122 16.92z"/></svg>
        </a>
      </div>
      <div class="track-address">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div class="track-address-text">
          <div class="track-address-label">Адрес доставки</div>
          <div class="track-address-value" id="trackAddress">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Order detail bottom sheet -->
<div class="filter-overlay" id="odOverlay"></div>
<aside class="filter-sheet filter-sheet--blocks" id="odSheet" aria-modal="true" style="max-height: 90vh">
  <div class="fbs-head">
    <div class="filter-sheet-title">Заказ</div>
    <button class="fbs-close" id="odClose" type="button" aria-label="Закрыть">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="fbs-body" id="odBody"></div>
  <div class="fbs-foot">
    <button class="fbs-btn fbs-btn-reset" id="odRepeat" type="button">Повторить</button>
    <button class="fbs-btn fbs-btn-apply" id="odSupport" type="button">Поддержка</button>
  </div>
</aside>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="bottom-nav">

  <a class="nav-item" href="index.html" data-page="index.html">
    <div class="nav-dot"></div>
    <div class="nav-icon">
      <svg class="nav-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path class="ni-body" d="M3 11.5L12 3l9 8.5V20a1.5 1.5 0 0 1-1.5 1.5H15v-7H9v7H4.5A1.5 1.5 0 0 1 3 20v-8.5z"/>
      </svg>
    </div>
    <span>Главная</span>
  </a>

  <a class="nav-item" href="restaurants.html" data-page="restaurants.html">
    <div class="nav-dot"></div>
    <div class="nav-icon">
      <svg class="nav-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect class="ni-body" x="3.5" y="3.5" width="7.5" height="7.5" rx="1.8"/>
        <rect class="ni-body" x="13" y="3.5" width="7.5" height="7.5" rx="1.8"/>
        <rect class="ni-body" x="3.5" y="13" width="7.5" height="7.5" rx="1.8"/>
        <rect class="ni-body" x="13" y="13" width="7.5" height="7.5" rx="1.8"/>
      </svg>
    </div>
    <span>Каталог</span>
  </a>

  <a class="nav-item" href="cart.html" data-page="cart.html">
    <div class="nav-dot"></div>
    <div class="nav-icon">
      <svg class="nav-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path class="ni-body" d="M5 8h14v12.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 20.5V8z"/>
        <path class="ni-line" d="M9 8V6.5a3 3 0 0 1 6 0V8"/>
      </svg>
    </div>
    <div class="cart-pill" id="navCartPill" hidden>0</div>
    <span>Корзина</span>
  </a>

  <a class="nav-item" href="profile.html" data-page="profile.html">
    <div class="nav-dot"></div>
    <div class="nav-icon">
      <svg class="nav-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle class="ni-body" cx="12" cy="8" r="4"/>
        <path class="ni-body" d="M4 21a8 8 0 0 1 16 0v.5H4z"/>
      </svg>
    </div>
    <span>Профиль</span>
  </a>

</nav>


<div class="toast" id="cart-toast" aria-live="polite"></div>

<script src="app.js"></script>
<script>
(function(){
  'use strict';

  var escH = (window.TG && TG.escHTML) || function(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  };
  function fmtMoney(n){
    n = Math.round(Number(n) || 0);
    return n.toLocaleString('ru-RU').replace(/,/g, ' ') + ' сум';
  }
  function toast(msg){
    var t = document.getElementById('cart-toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  // ---- Status definitions ----
  // Order of steps in the timeline (cancelled is a terminal branch, not part of the flow)
  var STATUS_FLOW = ['new', 'accepted', 'cooking', 'delivering', 'completed'];
  var STATUS_META = {
    'new':        { label: 'Новый',            short: 'Передан', cls: 'new',        icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
    'accepted':   { label: 'Принят рестораном', short: 'Принят',  cls: 'accepted',   icon: '<polyline points="20 6 9 17 4 12"/>' },
    'cooking':    { label: 'Готовится',         short: 'Готовится',cls: 'cooking',    icon: '<path d="M6 8h12l-1 11H7L6 8z"/><path d="M9 8V5a3 3 0 016 0v3"/>' },
    'delivering': { label: 'В пути',            short: 'В пути',  cls: 'delivering', icon: '<circle cx="6" cy="17" r="2"/><circle cx="18" cy="17" r="2"/><path d="M3 17h2l2-7h8l3 4h3v3"/>' },
    'completed':  { label: 'Завершён',          short: 'Доставлен',cls: 'completed',  icon: '<polyline points="20 6 9 17 4 12"/>' },
    'cancelled':  { label: 'Отменён',           short: 'Отменён', cls: 'cancelled',  icon: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' }
  };
  function isActive(status){ return status !== 'completed' && status !== 'cancelled'; }

  // ---- Mock orders ----
  var ORDERS = [
    {
      id: 'TG-7821',
      vendor: 'Hardees',
      status: 'new',
      datetime: '22 мая, 14:30',
      slotText: 'как можно скорее',
      address: 'ул. Амира Темура, 12, кв. 45',
      payment: 'Картой курьеру',
      items: [
        { name: 'Chicken fillet box', qty: 1, price: 116000, img: './img/dish-10.jpg' },
        { name: 'Coca-Cola 0.5л',    qty: 2, price: 12000, img: './img/dish-07.jpg' }
      ]
    },
    {
      id: 'TG-7818',
      vendor: 'Osh Markazi',
      status: 'accepted',
      datetime: '22 мая, 13:45',
      slotText: '14:00 – 15:00',
      address: 'ул. Амира Темура, 12, кв. 45',
      payment: 'Картой онлайн',
      items: [
        { name: 'Свадебный плов', qty: 1, price: 38000, img: './img/dish-03.jpg' },
        { name: 'Лепёшка обедненная (тандыр)', qty: 2, price: 8000, img: './img/dish-06.jpg' }
      ]
    },
    {
      id: 'TG-7805',
      vendor: 'Khan Atlas',
      status: 'cooking',
      datetime: '22 мая, 13:10',
      slotText: '13:30 – 14:30',
      address: 'Саларская набережная, 35А',
      payment: 'Картой онлайн',
      items: [
        { name: 'Шашлык-сет 6 шамп.', qty: 1, price: 96000, img: './img/dish-04.jpg' },
        { name: 'Овощной салат', qty: 1, price: 18000, img: './img/dish-05.jpg' }
      ]
    },
    {
      id: 'TG-7792',
      vendor: 'Norin House',
      status: 'delivering',
      datetime: '22 мая, 12:20',
      slotText: 'к 13:00',
      address: 'ул. Амира Темура, 12, кв. 45',
      payment: 'Наличные',
      destCoords: [41.31093, 69.27924],
      courier: {
        name: 'Алишер',
        role: 'Курьер · скутер',
        phone: '+998 90 123-45-67',
        coords: [41.31785, 69.27220]
      },
      items: [
        { name: 'Qazili norin', qty: 2, price: 35000, img: './img/dish-13.jpg' },
        { name: 'Чай чёрный', qty: 1, price: 6000, img: './img/dish-15.jpg' }
      ]
    },
    {
      id: 'TG-7714',
      vendor: 'Tandur Master',
      status: 'completed',
      datetime: '21 мая, 19:42',
      slotText: '20:00 – 21:00',
      deliveredAt: '21 мая, 20:23',
      address: 'ул. Амира Темура, 12, кв. 45',
      payment: 'Картой онлайн',
      items: [
        { name: 'Самса с мясом', qty: 4, price: 12000, img: './img/dish-08.jpg' },
        { name: 'Самса с тыквой', qty: 2, price: 11000, img: './img/dish-09.jpg' }
      ]
    },
    {
      id: 'TG-7702',
      vendor: 'Sweet Lab',
      status: 'completed',
      datetime: '20 мая, 16:15',
      slotText: '16:30 – 17:30',
      deliveredAt: '20 мая, 17:08',
      address: 'Саларская набережная, 35А',
      payment: 'Click',
      items: [
        { name: 'Десертный набор', qty: 1, price: 25000, img: './img/dish-14.jpg' },
        { name: 'Чак-чак', qty: 1, price: 18000, img: './img/dish-15.jpg' }
      ]
    },
    {
      id: 'TG-7689',
      vendor: 'Besh Qozon',
      status: 'cancelled',
      datetime: '19 мая, 13:24',
      slotText: '14:00 – 15:00',
      cancelledAt: '19 мая, 13:38',
      cancelReason: 'Ресторан временно перестал принимать заказы — не хватает ингредиентов для свадебного плова. Средства возвращены на карту в течение 1–3 рабочих дней.',
      cancelInitiator: 'Отменён рестораном',
      address: 'ул. Амира Темура, 12, кв. 45',
      payment: 'Картой онлайн · возврат',
      items: [
        { name: 'Свадебный плов', qty: 2, price: 38000, img: './img/dish-03.jpg' },
        { name: 'Лагман по-узбекски', qty: 1, price: 32000, img: './img/dish-05.jpg' }
      ]
    }
  ];

  function orderTotal(o){
    return o.items.reduce(function(s,i){ return s + (Number(i.price)||0) * (Number(i.qty)||0); }, 0);
  }
  function itemsPreview(o){
    var names = o.items.map(function(i){ return i.name; });
    if (names.length <= 2) return names.join(', ');
    return names.slice(0,2).join(', ') + ' +' + (names.length - 2);
  }

  // ---- DOM refs ----
  var $list   = document.getElementById('ordersList');
  var $tabs   = document.getElementById('ordersTabs');
  var $cntAll = document.getElementById('cntAll');
  var $cntActive = document.getElementById('cntActive');
  var $cntCompleted = document.getElementById('cntCompleted');
  var $navPill = document.getElementById('navCartPill');

  // Order detail
  var $odOv   = document.getElementById('odOverlay');
  var $odSh   = document.getElementById('odSheet');
  var $odBody = document.getElementById('odBody');
  var $odClose = document.getElementById('odClose');
  var $odRepeat = document.getElementById('odRepeat');
  var $odSupport= document.getElementById('odSupport');

  var currentTab = 'all';
  var currentOrderId = null;

  // ---- Cart pill ----
  function updateCartPill(){
    if (!$navPill) return;
    try {
      var items = JSON.parse(localStorage.getItem('tg-cart') || '[]') || [];
      var n = items.reduce(function(s, i){ return s + (Number(i.qty)||0); }, 0);
      if (n > 0) { $navPill.hidden = false; $navPill.textContent = n; }
      else { $navPill.hidden = true; }
    } catch(e){}
  }
  updateCartPill();

  // ---- Render list ----
  function statusPill(status){
    var m = STATUS_META[status]; if (!m) return '';
    return '<div class="order-status-pill ' + m.cls + '">'
      + '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">' + m.icon + '</svg>'
      + escH(m.label)
      + '</div>';
  }

  function renderList(){
    var all = ORDERS.length;
    var active = ORDERS.filter(function(o){ return isActive(o.status); }).length;
    var completed = all - active;
    $cntAll.textContent = all;
    $cntActive.textContent = active;
    $cntCompleted.textContent = completed;

    var filtered = ORDERS;
    if (currentTab === 'active')    filtered = ORDERS.filter(function(o){ return isActive(o.status); });
    if (currentTab === 'completed') filtered = ORDERS.filter(function(o){ return !isActive(o.status); });

    if (!filtered.length) {
      var emptyTitle = currentTab === 'active' ? 'Нет активных заказов' :
                       currentTab === 'completed' ? 'Нет завершённых заказов' :
                       'Заказов пока нет';
      var emptyText = currentTab === 'active' ? 'Когда сделаете заказ, он появится здесь.' :
                      currentTab === 'completed' ? 'Здесь будет история ваших заказов.' :
                      'Загляните в каталог — там много вкусного.';
      $list.innerHTML = '<div class="orders-empty">'
        + '<div class="orders-empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></div>'
        + '<div class="orders-empty-title">' + emptyTitle + '</div>'
        + '<div class="orders-empty-text">' + emptyText + '</div>'
        + '</div>';
      return;
    }

    $list.innerHTML = filtered.map(function(o){
      return '<article class="order-card" data-id="' + escH(o.id) + '">'
        +   '<div class="order-head">'
        +     statusPill(o.status)
        +     '<div class="order-date">' + escH(o.datetime) + '</div>'
        +   '</div>'
        +   '<h2 class="order-vendor">' + escH(o.vendor) + '</h2>'
        +   '<div class="order-items-preview">' + escH(itemsPreview(o)) + '</div>'
        +   '<div class="order-foot">'
        +     '<div class="order-total">' + fmtMoney(orderTotal(o)) + '</div>'
        +     '<button class="order-action" type="button" data-act="open" data-id="' + escH(o.id) + '">Подробнее →</button>'
        +   '</div>'
        + '</article>';
    }).join('');
  }
  renderList();

  // ---- Tab switching ----
  $tabs.addEventListener('click', function(e){
    var tab = e.target.closest('.page-tab');
    if (!tab) return;
    currentTab = tab.dataset.tab;
    $tabs.querySelectorAll('.page-tab').forEach(function(t){
      t.classList.toggle('active', t === tab);
    });
    renderList();
  });

  // ---- Detail sheet ----
  // Short labels for the horizontal timeline cells
  var STEP_LABELS_SHORT = {
    'new':        'Новый',
    'accepted':   'Принят',
    'cooking':    'Готовится',
    'delivering': 'В пути',
    'completed':  'Завершён'
  };

  function buildTimeline(status){
    // For 'completed', all steps are done.
    // For other statuses, steps up to current are 'done', current is 'active', rest are pending.
    var currentIdx = STATUS_FLOW.indexOf(status);
    var html = '<div class="od-timeline">';
    STATUS_FLOW.forEach(function(step, i){
      var meta = STATUS_META[step];
      var cls = '';
      if (status === 'completed') {
        cls = 'done';
      } else if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'active';
      var icon = (cls === 'done') ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="3" fill="currentColor"/>';
      html += '<div class="od-step ' + cls + '">'
        + '<div class="od-step-dot"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">' + icon + '</svg></div>'
        + '<div class="od-step-body">'
        +   '<div class="od-step-title">' + escH(STEP_LABELS_SHORT[step] || meta.label) + '</div>'
        +   (cls === 'active' ? '<div class="od-step-time">сейчас</div>' : '')
        + '</div>'
        + '</div>';
    });
    html += '</div>';
    return html;
  }

  function openDetail(orderId){
    var o = ORDERS.find(function(x){ return x.id === orderId; });
    if (!o) return;
    currentOrderId = orderId;
    var total = orderTotal(o);

    var itemsHtml = o.items.map(function(it){
      var img = it.img ? "background-image: url('" + escH(it.img) + "');" : '';
      return ''
        + '<div class="od-item">'
        +   '<div class="od-item-img" style="' + img + '"></div>'
        +   '<div class="od-item-body">'
        +     '<div class="od-item-name">' + escH(it.name) + '</div>'
        +     '<div class="od-item-qty">' + (Number(it.qty)||0) + ' шт · ' + fmtMoney(it.price) + '</div>'
        +   '</div>'
        +   '<div class="od-item-price">' + fmtMoney((Number(it.price)||0) * (Number(it.qty)||0)) + '</div>'
        + '</div>';
    }).join('');

    var trackBtnHtml = (o.status === 'delivering')
      ? '<button class="od-track-btn" type="button" data-act="track" data-id="' + escH(o.id) + '">'
        + '<span class="od-track-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></span>'
        + '<span class="od-track-text"><span class="od-track-title">Отследить курьера</span><span class="od-track-sub">Карта · маршрут · время</span></span>'
        + '<span class="od-track-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>'
        + '</button>'
      : '';

    var deliveryRows = '<div class="od-info-row"><div class="od-info-label">Адрес</div><div class="od-info-value">' + escH(o.address) + '</div></div>'
      + '<div class="od-info-row"><div class="od-info-label">Время</div><div class="od-info-value">' + escH(o.slotText) + '</div></div>';
    if (o.status === 'completed' && o.deliveredAt) {
      deliveryRows += '<div class="od-info-row"><div class="od-info-label">Доставлен</div><div class="od-info-value od-info-success">' + escH(o.deliveredAt) + '</div></div>';
    }
    if (o.status === 'cancelled' && o.cancelledAt) {
      deliveryRows += '<div class="od-info-row"><div class="od-info-label">Отменён</div><div class="od-info-value od-info-danger">' + escH(o.cancelledAt) + '</div></div>';
    }
    deliveryRows += '<div class="od-info-row"><div class="od-info-label">Оплата</div><div class="od-info-value">' + escH(o.payment) + '</div></div>'
      + '<div class="od-info-row"><div class="od-info-label">Сумма</div><div class="od-info-value">' + fmtMoney(total) + '</div></div>';

    // Cancelled orders: replace the timeline section with a "reason" callout.
    var statusSection;
    if (o.status === 'cancelled') {
      statusSection = ''
        + '<div class="od-cancel-callout">'
        +   '<div class="od-cancel-icon">'
        +     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
        +   '</div>'
        +   '<div class="od-cancel-body">'
        +     '<div class="od-cancel-title">Заказ отменён</div>'
        +     (o.cancelInitiator ? '<div class="od-cancel-meta">' + escH(o.cancelInitiator) + (o.cancelledAt ? ' · ' + escH(o.cancelledAt) : '') + '</div>' : '')
        +     (o.cancelReason
                ? '<div class="od-cancel-reason"><div class="od-cancel-reason-label">Причина отмены</div><div class="od-cancel-reason-text">' + escH(o.cancelReason) + '</div></div>'
                : '')
        +   '</div>'
        + '</div>';
    } else {
      statusSection = ''
        + '<div class="od-section">'
        +   '<div class="od-section-title">Статус заказа</div>'
        +   buildTimeline(o.status)
        + '</div>';
    }

    $odBody.innerHTML = ''
      + '<div class="od-head">'
      +   '<div class="od-vendor">' + escH(o.vendor) + '</div>'
      +   '<div class="od-date">Заказ ' + escH(o.id) + ' · ' + escH(o.datetime) + '</div>'
      + '</div>'
      + '<div class="od-status-row">' + statusPill(o.status) + '</div>'
      + trackBtnHtml
      + statusSection

      + '<div class="od-section">'
      +   '<div class="od-section-title">Состав</div>'
      +   itemsHtml
      + '</div>'

      + '<div class="od-section">'
      +   '<div class="od-section-title">Доставка</div>'
      +   deliveryRows
      + '</div>';

    // Adjust footer buttons
    var canRepeat = o.status === 'completed' || o.status === 'cancelled';
    $odRepeat.style.display = canRepeat ? '' : 'none';

    $odOv.classList.add('show');
    $odSh.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeDetail(){
    $odOv.classList.remove('show');
    $odSh.classList.remove('show');
    document.body.style.overflow = '';
    currentOrderId = null;
  }
  $odOv.addEventListener('click', closeDetail);
  $odClose.addEventListener('click', closeDetail);

  // ---- List click delegation ----
  $list.addEventListener('click', function(e){
    var btn = e.target.closest('.order-action');
    if (btn) {
      e.stopPropagation();
      openDetail(btn.dataset.id);
      return;
    }
    var card = e.target.closest('.order-card');
    if (card) openDetail(card.dataset.id);
  });

  // ---- Track button inside detail sheet ----
  $odBody.addEventListener('click', function(e){
    var btn = e.target.closest('[data-act="track"]');
    if (!btn) return;
    var id = btn.dataset.id;
    openTracking(id);
  });

  // ---- Repeat order: add items to cart ----
  function repeatOrder(orderId){
    var o = ORDERS.find(function(x){ return x.id === orderId; });
    if (!o) return;
    var items = [];
    try { items = JSON.parse(localStorage.getItem('tg-cart') || '[]') || []; } catch(e){}
    // Vendor id derived from vendor name (lowercased, hyphenated)
    var vId = o.vendor.toLowerCase().replace(/[^a-zа-яё0-9]+/gi, '-');
    o.items.forEach(function(it, i){
      items.push({
        id: o.id + '-' + i,
        name: it.name,
        img:  it.img,
        price: it.price,
        qty:   it.qty,
        vendorId: vId
      });
    });
    try {
      localStorage.setItem('tg-cart', JSON.stringify(items));
      localStorage.setItem('tg-cart-active-vendor', vId);
    } catch(e){}
    toast('Добавлено в корзину');
    setTimeout(function(){ location.href = 'cart.html'; }, 700);
  }
  $odRepeat.addEventListener('click', function(){
    if (currentOrderId) repeatOrder(currentOrderId);
  });
  $odSupport.addEventListener('click', function(){
    toast('Поддержка: +998 71 200-00-00');
  });

  // ========================================================
  //  COURIER TRACKING — Leaflet map + route + ETA
  // ========================================================
  var $trackSheet = document.getElementById('trackSheet');
  var $trackBack  = document.getElementById('trackBack');
  var $trackTitle = document.getElementById('trackTitle');
  var $trackSub   = document.getElementById('trackSub');
  var $trackName  = document.getElementById('trackName');
  var $trackRole  = document.getElementById('trackRole');
  var $trackAvatar = document.getElementById('trackAvatar');
  var $trackCall  = document.getElementById('trackCall');
  var $trackAddress = document.getElementById('trackAddress');
  var $trackEtaMin = document.getElementById('trackEtaMin');
  var $trackDist  = document.getElementById('trackDistance');
  var $trackArrive = document.getElementById('trackArrive');

  var trackMap = null, trackDestMarker = null, trackCourierMarker = null, trackRouteLine = null;
  var trackTimer = null;

  function haversineKm(a, b){
    var R = 6371;
    var dLat = (b[0]-a[0]) * Math.PI/180;
    var dLon = (b[1]-a[1]) * Math.PI/180;
    var la1 = a[0] * Math.PI/180, la2 = b[0] * Math.PI/180;
    var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.sin(dLon/2)*Math.sin(dLon/2) * Math.cos(la1) * Math.cos(la2);
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  // Simulated street route between two points: a few right-angle waypoints
  function mockRoute(from, to){
    var midLat = from[0] + (to[0] - from[0]) * 0.6;
    var midLon = from[1] + (to[1] - from[1]) * 0.35;
    return [
      from,
      [from[0], from[1] + (to[1]-from[1])*0.25],
      [midLat,  from[1] + (to[1]-from[1])*0.25],
      [midLat,  midLon],
      [to[0],   midLon],
      to
    ];
  }

  function routeLengthKm(pts){
    var s = 0;
    for (var i = 1; i < pts.length; i++) s += haversineKm(pts[i-1], pts[i]);
    return s;
  }

  function pad2t(n){ return n < 10 ? '0' + n : '' + n; }
  function formatArrival(addMin){
    var d = new Date();
    d.setMinutes(d.getMinutes() + addMin);
    return pad2t(d.getHours()) + ':' + pad2t(d.getMinutes());
  }

  function ensureTrackMap(centerCoords){
    if (typeof L === 'undefined') return null;
    if (!trackMap) {
      trackMap = L.map('trackMap', {
        center: centerCoords,
        zoom: 15,
        zoomControl: false,
        attributionControl: false
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(trackMap);
    }
    setTimeout(function(){ if (trackMap) trackMap.invalidateSize(); }, 60);
    return trackMap;
  }

  function clearTrackLayers(){
    if (!trackMap) return;
    if (trackDestMarker) { trackMap.removeLayer(trackDestMarker); trackDestMarker = null; }
    if (trackCourierMarker) { trackMap.removeLayer(trackCourierMarker); trackCourierMarker = null; }
    if (trackRouteLine) { trackMap.removeLayer(trackRouteLine); trackRouteLine = null; }
  }

  function openTracking(orderId){
    var o = ORDERS.find(function(x){ return x.id === orderId; });
    if (!o || o.status !== 'delivering' || !o.courier || !o.destCoords) return;

    closeDetail();

    // Populate text
    $trackTitle.textContent = o.vendor;
    $trackSub.textContent = 'Курьер в пути';
    $trackName.textContent = o.courier.name || 'Курьер';
    $trackRole.textContent = o.courier.role || 'Едет к вам';
    $trackAvatar.textContent = (o.courier.name || '?').charAt(0).toUpperCase();
    $trackAddress.textContent = o.address || '';
    var phoneDigits = (o.courier.phone || '').replace(/[^\d+]/g, '');
    $trackCall.href = 'tel:' + phoneDigits;

    // Show sheet
    $trackSheet.classList.add('show');
    document.body.style.overflow = 'hidden';

    // Map + markers + route
    var dest = o.destCoords;
    var courier = o.courier.coords;
    var midPoint = [(dest[0]+courier[0])/2, (dest[1]+courier[1])/2];
    var map = ensureTrackMap(midPoint);
    if (!map) return;

    clearTrackLayers();

    var destIcon = L.divIcon({
      className: 'tk-pin-wrap tk-pin-dest',
      html: '<div class="tk-pin-head"></div><div class="tk-pin-shadow"></div>',
      iconSize: [32, 42], iconAnchor: [16, 38]
    });
    var courierIcon = L.divIcon({
      className: 'tk-pin-wrap tk-pin-courier',
      html: '<div class="tk-courier-head"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="2"/><circle cx="18" cy="17" r="2"/><path d="M3 17h2l2-7h8l3 4h3v3"/></svg></div><div class="tk-pin-pulse"></div>',
      iconSize: [40, 40], iconAnchor: [20, 20]
    });
    trackDestMarker = L.marker(dest, { icon: destIcon }).addTo(map);
    trackCourierMarker = L.marker(courier, { icon: courierIcon }).addTo(map);

    var route = mockRoute(courier, dest);
    trackRouteLine = L.polyline(route, {
      color: '#FC3F1D', weight: 5, opacity: 0.9, lineCap: 'round', lineJoin: 'round'
    }).addTo(map);

    // Fit bounds
    var bounds = L.latLngBounds([courier, dest]);
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });

    // ETA / distance from route length, avg scooter speed 22 km/h
    var distKm = routeLengthKm(route);
    var etaMin = Math.max(1, Math.round(distKm / 22 * 60));
    $trackDist.textContent = distKm.toFixed(1);
    $trackEtaMin.textContent = etaMin;
    $trackArrive.textContent = formatArrival(etaMin);

    // Try real OSRM routing in the background; replace the mock line on success
    fetch('https://router.project-osrm.org/route/v1/driving/'
        + courier[1] + ',' + courier[0] + ';' + dest[1] + ',' + dest[0]
        + '?overview=full&geometries=geojson')
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (!data || !data.routes || !data.routes.length) return;
        var coords = data.routes[0].geometry.coordinates.map(function(c){ return [c[1], c[0]]; });
        if (trackRouteLine) map.removeLayer(trackRouteLine);
        trackRouteLine = L.polyline(coords, {
          color: '#FC3F1D', weight: 5, opacity: 0.95, lineCap: 'round', lineJoin: 'round'
        }).addTo(map);
        var km = data.routes[0].distance / 1000;
        var realEta = Math.max(1, Math.round(data.routes[0].duration / 60));
        $trackDist.textContent = km.toFixed(1);
        $trackEtaMin.textContent = realEta;
        $trackArrive.textContent = formatArrival(realEta);
        map.fitBounds(L.latLngBounds(coords), { padding: [60, 60], maxZoom: 16 });
      })
      .catch(function(){ /* keep mock */ });
  }

  function closeTracking(){
    $trackSheet.classList.remove('show');
    document.body.style.overflow = '';
    if (trackTimer) { clearInterval(trackTimer); trackTimer = null; }
  }

  $trackBack.addEventListener('click', closeTracking);

  document.addEventListener('keydown', function(e){
    if (e.key !== 'Escape') return;
    if ($trackSheet.classList.contains('show')) { closeTracking(); return; }
    if ($odSh.classList.contains('show')) closeDetail();
  });
})();
</script>
</body>
</html>
